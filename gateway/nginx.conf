# Docker's embedded DNS — required to re-resolve service names dynamically
# so load balancing works across scaled worker containers
resolver 127.0.0.11 valid=5s ipv6=off;

upstream api_manager {
    server api-manager:3000;
}

upstream dashboard {
    server dashboard:80;
}

server {
    listen 80;

    # Queue-based: connect to a specific worker by IP
    # Path: /playwright/{worker-ip}  e.g. /playwright/172.18.0.5
    location ~ ^/playwright/(?<worker_addr>[^/]+) {
        set $pw_backend "${worker_addr}:9222";
        proxy_pass http://$pw_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_connect_timeout 30s;
    }

    # VNC/noVNC live stream via websockify: connect to a specific worker by IP
    # Path: /stream/{worker-ip}  e.g. /stream/172.18.0.5
    # Captures optional path suffix so /stream/IP/vnc.html → worker:6080/vnc.html
    location ~ ^/stream/(?<worker_addr>[^/]+)(?<stream_path>/.*)?$ {
        proxy_pass http://${worker_addr}:6080$stream_path;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_connect_timeout 10s;
    }

    # Screenshot files served by api-manager
    location /screenshots/ {
        proxy_pass http://api_manager/screenshots/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Video recordings served by api-manager
    location /videos/ {
        proxy_pass http://api_manager/videos/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Playwright WebSocket round-robin fallback (no queue)
    location /playwright {
        set $pw_backend worker:9222;
        proxy_pass http://$pw_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_connect_timeout 30s;
    }

    # REST API
    location /api/ {
        proxy_pass http://api_manager/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Socket.io (requires WebSocket upgrade)
    location /socket.io/ {
        proxy_pass http://api_manager/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Vue dashboard (catch-all)
    location / {
        proxy_pass http://dashboard/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
