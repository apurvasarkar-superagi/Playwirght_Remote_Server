# Docker's embedded DNS — required to re-resolve service names dynamically
# so load balancing works across scaled worker containers
resolver 127.0.0.11 valid=5s ipv6=off;

upstream api_manager {
    server api-manager:3000;
}

upstream dashboard {
    server dashboard:80;
}

server {
    listen 80;

    # Playwright WebSocket load balancer
    # Use a variable so nginx re-resolves `worker` on each new connection —
    # Docker DNS round-robins the IPs, distributing connections across workers.
    location /playwright {
        set $pw_backend worker:9222;
        proxy_pass http://$pw_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_connect_timeout 30s;
    }

    # REST API
    location /api/ {
        proxy_pass http://api_manager/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Socket.io (requires WebSocket upgrade)
    location /socket.io/ {
        proxy_pass http://api_manager/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Vue dashboard (catch-all)
    location / {
        proxy_pass http://dashboard/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
