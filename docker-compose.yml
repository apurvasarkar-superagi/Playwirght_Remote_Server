services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=playwright
      - POSTGRES_PASSWORD=playwright
      - POSTGRES_DB=playwright_runs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playwright -d playwright_runs"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-manager:
    build: ./api-manager
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - DATABASE_URL=postgres://playwright:playwright@postgres:5432/playwright_runs
    volumes:
      - screenshots:/data/screenshots
      - videos:/data/videos
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./worker
    environment:
      - REDIS_URL=redis://redis:6379
      - DEBUG=pw:server
      - DISPLAY=:99
      - STREAM_PORT=6080
    volumes:
      - screenshots:/data/screenshots
      - videos:/data/videos
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api-manager
      - dashboard
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http gateway:80 --log=stdout
    ports:
      - "4040:4040"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
  screenshots:
  videos:
